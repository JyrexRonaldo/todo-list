<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="../src/index.js" defer></script>
    <link rel="stylesheet" href="../src/reset.css">
    <link rel="stylesheet" href="../src/style.css">
    <title>Todo List</title>
</head>

<body>
    <header>
        <img src="../src/assets/todo-logo.svg" alt="">
        <h1>Todo List</h1>
    </header>
    <main>
        <section>
            <div>Home</div>
            <ul>
                <li><img src="../src/assets/inbox-arrow-down.svg" alt="">
                    All Tasks</li>
                <li><img src="../src/assets/calendar-today.svg" alt="">
                    Today</li>
                <li><img src="../src/assets/calendar-week.svg" alt="">
                    Next 7 Days</li>
                <li><img src="../src/assets/exclamation-thick.svg" alt="">
                    Important</li>
                <li><img src="../src/assets/completed.svg" alt="">
                    Completed</li>
            </ul>
            <div>Projects</div>
            <ul class="project-list">
                <li class="add">Add Project</li>
            </ul>
            <form class="project" action="#">
                <input type="text" name="" id="">
                <button type="button">Add</button>
                <button type="button">Cancel</button>
            </form>
        </section>
        <section>
            <p class="content title">All task</p>
            <ul class="content task">
                <li class="add">Add Task</li>
            </ul>
            <div class="form">
                <form action="#">
                    <div>
                        <p>All Task</p>
                    </div>
                    <div>
                        <p>
                            <label for="title">Title</label>
                            <input id="title" type="text">
                        </p>
                        <p>
                            <label for="description">Description</label>
                            <textarea name="" id="description" cols="30" rows="5"></textarea>
                        </p>
                        <p>
                            <label for="due-date">Due Date</label>
                            <input type="date" id="due-date">
                        </p>
                        <p>
                            <label for="priority">Is this important?</label>
                            <select name="priority" id="priority">
                                <option value="no">Not important at all..</option>
                                <option value="yes">Super important!</option>
                            </select>
                        </p>
                        <p>
                            <button type="button">Add</button>
                            <button type="button">Cancel</button>
                        </p>
                    </div>
                </form>
            </div>
        </section>
    </main>
    <footer>
        <p>Copyright © 2022 JyrexRonaldo</p>
    </footer>
</body>

</html>
