<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="../src/index.js" defer></script>
    <link rel="stylesheet" href="../src/reset.css">
    <link rel="stylesheet" href="../src/style.css">
    <title>Todo List</title>
</head>

<body>
    <header>
        <img src="../src/assets/todo-logo.svg" alt="">
        <h1>Todo List</h1>
    </header>
    <main>
        <section>
            <div>Home</div>
            <ul>
                <li><img src="../src/assets/inbox-arrow-down.svg" alt="">
                    All Tasks</li>
                <li><img src="../src/assets/calendar-today.svg" alt="">
                    Today</li>
                <li><img src="../src/assets/calendar-week.svg" alt="">
                    Next 7 Days</li>
                <li><img src="../src/assets/exclamation-thick.svg" alt="">
                    Important</li>
            </ul>
            <div>Projects</div>
            <ul class="project-list">
                <!-- <li><img src="../src/assets/menu.svg" alt="">
                    Plenty money<div class="delete-button">✖</div>
                </li>

                <li><img src="../src/assets/menu.svg" alt="">
                    more money<div class="delete-button">✖</div>
                </li> -->
                <li class="add">Add Project</li>
            </ul>
            <form class="project" action="#">
                <input type="text" name="" id="">
                <button type="button">Add</button>
                <button type="button">Cancel</button>
            </form>
        </section>
        <section>
            <p class="content title">All task</p>
            <ul class="content todo">
                <li><input type="checkbox"><p>Make bed</p><button type="button">DETAILS</button><span>No date</span><img src="../src/assets/edit-icon.svg" alt="" class="edit-button"><img src="../src/assets/delete-icon.svg" alt="" class="delete-button">
                </li>
                <li><input type="checkbox"><p>make clothes</p><button type="button">DETAILS</button><span>No date</span><img src="../src/assets/edit-icon.svg" alt="" class="edit-button"><img src="../src/assets/delete-icon.svg" alt="" class="delete-button">
                </li>
                <li><input type="checkbox"><p>make more cash</p><button type="button">DETAILS</button><span>No date</span><img src="../src/assets/edit-icon.svg" alt="" class="edit-button"><img src="../src/assets/delete-icon.svg" alt="" class="delete-button">
                </li>
                <li class="add">Add Task</li>
            </ul>
            <form class="todo" action="#">
                <div>
                    <label for="title">Title:</label>
                    <input type="text" id="title" name="title" placeholder="What to do?">
                </div>
                <div>
                    <label for="details">Details(optional):</label>
                    <input type="text" id="details" name="details" placeholder="eg: I'm going to make my bed">
                </div>
                <div>
                    <label for="date">Date:</label>
                    <input type="date" name="date" id="date">
                </div>
                <div class="form-button">
                    <button type="button">Add</button>
                    <button type="button">Cancel</button>
                </div>
            </form>
        </section>
    </main>
    <footer>
        <p>Copyright © 2022 JyrexRonaldo</p>
    </footer>
</body>

</html>
